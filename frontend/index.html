<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wanderlust - Login</title>
    <style>
        body { 
            /* Background image from Unsplash for a travel feel */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        form { 
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem 2rem; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            width: 320px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            margin: 0 0 10px 0;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        input { 
            background: rgba(255, 255, 255, 0.9); 
            border: none; 
            color: #333; 
            padding: 12px 15px; 
            border-radius: 30px; /* Rounded for a softer look */
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button { 
            background: #ff5a5f; /* Classic travel "CTA" coral/red color */
            color: #fff; 
            border: none; 
            padding: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        button:hover { 
            background: #e0484d; 
            transform: scale(1.02);
        }

        ::placeholder {
            color: #888;
        }
    </style>
</head>
<body>
    <form action="/submit" method="POST">
        <h2 style="text-align: center;">Begin Your Journey</h2>
        <input type="email" name="user_email" placeholder="Email Address" required>
        <input type="password" name="user_pass" placeholder="Password" required>
        <button type="submit">Explore Now</button>
    </form>
</body>
</html>
