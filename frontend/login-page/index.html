<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>bharatbhraman – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css">
  
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- simple compass / journey icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2Zm0 2a8 8 0 1 1 0 16A8 8 0 0 1 12 4Zm3.2 3.6-4.8 2-2 4.8 4.8-2 2-4.8Zm-3.2 3a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4Z"/>
      </svg>
    </div>
    <div class="logo-name">bharat<span>bhraman</span></div>
    <div class="logo-tagline">Your AI Travel Companion<br>for Unforgettable Indian Adventures</div>
  </div>


  <!-- ── Sign In Panel ── -->
  <div class="panel active" id="panel-signin">

    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email-in" placeholder="you@gmail.com" autocomplete="email"/>
      </div>
    </div>

  <form>
    <div class="field">
      <label>Password</label>

      <div class="input-wrap">
        <input 
          type="password" 
          id="pw-in" 
          placeholder="••••••••"
          pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}"
          title="Minimum 8 characters, at least one letter and one number"
          required
        />
        <button type="button" class="show-btn" onclick="toggle('pw-in', this)">Show</button>
      </div>

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>
    </div>
  </form>

  <a href="main.html">
  <button class="btn-primary" >Sign In</button>
</a>
 <div class="divider">or</div>

 

    <div class="card-footer">
      Don't have an account? <a href="#" onclick="switchTab('signup');return false;">Create one</a>
    </div>

  </div>

  </div>
</div>

  <script src="index.js"></script>

</body>
</html>
