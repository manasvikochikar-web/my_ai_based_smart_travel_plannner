<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChaloGhoomne – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #f5efe6;
      --card-bg:  #fdfaf5;
      --orange:   #d95f1a;
      --orange-h: #c24e10;
      --text:     #2b1d0e;
      --muted:    #9a7f66;
      --border:   #e4d5c3;
      --tab-bg:   #ede4d8;
      --shadow:   0 20px 60px rgba(100,50,10,.12), 0 4px 16px rgba(100,50,10,.08);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(217,95,26,.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(217,95,26,.07) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L32 20 L47 10 L37 23 L55 25 L40 32 L50 46 L34 40 L30 55 L26 40 L10 46 L20 32 L5 25 L23 23 L13 10 L28 20 Z' fill='none' stroke='rgba(217,95,26,0.04)' stroke-width='1'/%3E%3C/svg%3E");
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.9);
      animation: rise .55s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes rise {
      from { opacity:0; transform:translateY(28px) scale(.97); }
      to   { opacity:1; transform:none; }
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: var(--orange);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(217,95,26,.35);
    }
    .logo-icon svg { width:28px; height:28px; fill:white; }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }
    .logo-name span { color: var(--orange); }
    .logo-tagline {
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      font-weight: 400;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--tab-bg);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      border: none;
      background: transparent;
      padding: 11px 0;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .25s ease;
    }
    .tab.active {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 4px 14px rgba(217,95,26,.35);
    }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input::placeholder { color: #c5b09a; }
    .input-wrap input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(217,95,26,.12);
    }
    .show-btn {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      border: none; background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      padding: 0;
    }
    .show-btn:hover { color: var(--orange); }

    .forgot {
      text-align: right;
      margin-top: 6px;
    }
    .forgot a {
      font-size: .8rem;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
    }
    .forgot a:hover { color: var(--orange); }

    /* ── Primary Button ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 0 6px 20px rgba(217,95,26,.35);
      transition: background .2s, transform .15s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.15) 0%, transparent 100%);
      pointer-events: none;
    }
    .btn-primary:hover {
      background: var(--orange-h);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(217,95,26,.45);
    }
    .btn-primary:active { transform: translateY(0); }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
      color: var(--muted); font-size: .82rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* ── Google Button ── */
    .btn-google {
      width: 100%;
      padding: 13px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 600;
      color: var(--text); cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .btn-google:hover {
      border-color: var(--orange);
      box-shadow: 0 4px 16px rgba(217,95,26,.12);
      transform: translateY(-1px);
    }
    .btn-google svg { width:20px; height:20px; }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      margin-top: 22px;
      font-size: .85rem;
      color: var(--muted);
    }
    .card-footer a {
      color: var(--orange);
      font-weight: 600;
      text-decoration: none;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Register panel (hidden by default) ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* name row */
    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- simple compass / journey icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2Zm0 2a8 8 0 1 1 0 16A8 8 0 0 1 12 4Zm3.2 3.6-4.8 2-2 4.8 4.8-2 2-4.8Zm-3.2 3a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4Z"/>
      </svg>
    </div>
    <div class="logo-name">Chalo<span>Ghoomne</span></div>
    <div class="logo-tagline">Your AI Travel Companion<br>for Unforgettable Indian Adventures</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
    <button class="tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- ── Sign In Panel ── -->
  <div class="panel active" id="panel-signin">

    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email-in" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="pw-in" placeholder="••••••••"/>
        <button class="show-btn" onclick="toggle('pw-in',this)">Show</button>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-primary" onclick="handleSignIn()">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="handleGoogle()">
      <!-- Google G -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="card-footer">
      Don't have an account? <a href="#" onclick="switchTab('signup');return false;">Create one</a>
    </div>

  </div>

  <!-- ── Create Account Panel ── -->
  <div class="panel" id="panel-signup">

    <div class="name-row">
      <div class="field">
        <label>First Name</label>
        <div class="input-wrap">
          <input type="text" placeholder="Arjun" autocomplete="given-name"/>
        </div>
      </div>
      <div class="field">
        <label>Last Name</label>
        <div class="input-wrap">
          <input type="text" placeholder="Sharma" autocomplete="family-name"/>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <input type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="pw-up" placeholder="••••••••"/>
        <button class="show-btn" onclick="toggle('pw-up',this)">Show</button>
      </div>
    </div>

    <button class="btn-primary" onclick="handleSignUp()">Create Account</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </button>

    <div class="card-footer">
      Already have an account? <a href="#" onclick="switchTab('signin');return false;">Sign in</a>
    </div>

  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function toggle(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text';     btn.textContent = 'Hide'; }
    else                         { inp.type = 'password'; btn.textContent = 'Show'; }
  }

  function handleSignIn() {
    const e = document.getElementById('email-in').value.trim();
    const p = document.getElementById('pw-in').value;
    if (!e || !p) { alert('Please fill in all fields.'); return; }
    alert('Signing in as ' + e + ' …\n(Connect to your backend here!)');
  }

  function handleSignUp() {
    alert('Account creation flow — connect to your backend here!');
  }

  function handleGoogle() {
    alert('Google OAuth flow — integrate your Google client ID here!');
  }
</script>

</body>
</html>
